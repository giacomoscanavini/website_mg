<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meng Guo</title>

  <!--
    ═══════════════════════════════════════════════════════════════
    GOOGLE FONTS
    Three typefaces are loaded:
      • Libre Baskerville — elegant serif for the name and article
        titles. Gives an editorial, academic feel.
      • Ma Shan Zheng    — Chinese brush-calligraphy style, used
        only for the Chinese name (郭萌) in the header.
      • Outfit            — clean sans-serif for body text and UI.
        Loaded at weights 200, 300, and 400.
      • Space Mono        — monospace for labels, dates, category
        tags, and metadata. Creates technical contrast against the
        warm serif titles.
    To swap a font: replace the family name in the URL and update
    the matching font-family references in the CSS below.
    ═══════════════════════════════════════════════════════════════
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Ma+Shan+Zheng&family=Outfit:wght@200;300;400&family=Space+Mono:wght@400&display=swap" rel="stylesheet" />

  <style>

    /*
      ─────────────────────────────────────────────────────────────
      DESIGN TOKENS  (CSS custom properties)
      All site colours are defined here as variables. Changing a
      value once updates every element that references it.

        --black   → main body text
        --mid     → secondary text (journal names, role labels)
        --light   → tertiary text (dates, counts, faint metadata)
        --bg      → warm off-white page background
        --white   → used for the subwindow modal panel
        --accent  → deep teal — the primary brand colour used for
                    links, active states, section labels, buttons.
                    Change this one value to rebrand the colour scheme.
        --accent2 → warm earth tone, reserved for future use
        --rule    → very light warm grey for all divider lines

      Start here when changing the overall colour feel of the site.
      ─────────────────────────────────────────────────────────────
    */
    :root {
      --black:    #141a1f;
      --mid:      #7a8a96;
      --light:    #b0bec8;
      --bg:       #f7f5f2;
      --white:    #ffffff;
      --accent:   #3a7a6a;
      --accent2:  #8b5e3c;
      --rule:     #ddd8d0;
    }

    /* Universal reset — removes browser default spacing from every element */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /*
      Base font-size of 16px makes 1rem = 16px sitewide.
      scroll-behavior: smooth makes section-nav clicks animate to
      their target rather than jumping instantly.
    */
    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--black);
      font-weight: 300;                    /* light weight for a refined look */
      -webkit-font-smoothing: antialiased; /* crisper text rendering on macOS/iOS */
    }


    /*
      ─────────────────────────────────────────────────────────────
      HEADER
      The top block with the name, Chinese name, decorative image,
      and the two thin rule lines beneath them.
      Starts invisible (opacity:0, shifted 16px down) and fades in
      via the fadeUp keyframe animation defined below.
      max-width: 900px + margin:auto centres content on wide screens.
      Adjust padding to change the vertical breathing room.
      ─────────────────────────────────────────────────────────────
    */
    header {
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 48px 56px; /* top / left+right / bottom */
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s ease forwards;
    }

    /*
      Flex row containing the name block on the left and the
      decorative image on the right.
      justify-content: space-between pushes them to opposite ends.
    */
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 32px;
      margin-bottom: 28px;
    }

    /*
      Large English name "Meng Guo".
      clamp() makes the size fluid: min 2.4rem → scales with
      viewport (5.5vw) → capped at 4rem on large screens.
      Raise the third value to allow a bigger maximum size.
    */
    .site-name {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: clamp(2.4rem, 5.5vw, 4rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--black);
    }

    /*
      The <span> inside .site-name wraps "Guo" and places it on
      its own line in italic teal, separating surname from given name.
    */
    .site-name span {
      display: block;
      font-style: italic;
      color: var(--accent);
    }

    /*
      Chinese name 郭萌 in brush-calligraphy font (Ma Shan Zheng).
      Sits baseline-aligned next to the English name.
      Slightly smaller and in --mid grey so it complements without
      competing. To change the characters: edit the text in the HTML.
    */
    .site-name-zh {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      font-style: normal;
      font-weight: 400;
      color: var(--mid);
      letter-spacing: 0.06em;
      padding-left: 18px;
      align-self: flex-end;   /* aligns to the English name baseline */
      padding-bottom: 0.12em;
      line-height: 1;
    }

    /* Not currently used in the HTML — kept for reference */
    .header-role {
      text-align: right;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
      line-height: 2;
      padding-top: 8px;
    }


    /*
      ─────────────────────────────────────────────────────────────
      HEADER IMAGE
      Decorative image on the right side of the header.
      Clipped to a fixed height with a left-edge fade so it blends
      seamlessly into the page background — no hard crop line.

      Quick edits:
        • Swap image  → change "header0.jpg" in the <img> below
        • Adjust crop → change object-position
            e.g. "left center" or "80% top"
        • Change height → increase/decrease the height value here
        • Move the fade → adjust the % values in mask-image
      ─────────────────────────────────────────────────────────────
    */
    .header-image-wrap {
      position: relative;   /* so the role text can be absolutely positioned inside */
      flex: 0 0 auto;
      width: clamp(220px, 42%, 400px); /* fluid: min 220px → scales → max 400px */
      height: 140px;
      overflow: hidden;
      align-self: stretch;
    }

    .header-image {
      width: 100%;
      height: 100%;
      object-fit: cover;            /* fills container without distortion */
      object-position: 60% center;  /* crop anchor — increase % to show more right */
      display: block;
      /* CSS mask: left edge transparent → blends → fully visible on right */
      -webkit-mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.45) 22%, black 55%);
      mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.45) 22%, black 55%);
    }

    /*
      Role/title text overlaid at the bottom of the image.
      The gradient fades from the page background (solid at bottom)
      to transparent at the top, so text stays readable regardless
      of what the image shows beneath it.
      To update the text: edit the HTML inside this div below.
    */
    .header-image-role {
      position: absolute;
      bottom: 0;
      right: 0;
      left: 0;
      padding: 28px 4px 6px;
      text-align: right;
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--mid);
      line-height: 2;
      background: linear-gradient(to top, var(--bg) 38%, transparent);
    }


    /*
      Two decorative horizontal rules beneath the name block.
      First: a bold dark gradient (dark → transparent).
      Second: a thinner, lighter version 4px below it.
      Together they create a subtle double-rule effect.
    */
    .header-rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, var(--black) 60%, transparent);
      margin-bottom: 4px;
    }
    .header-rule-thin {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, var(--rule) 80%, transparent);
    }


    /*
      ─────────────────────────────────────────────────────────────
      LAB NAV
      Small bar below the header with a bordered button linking to
      the research group page and a descriptor label beside it.
      Fades in 0.15s after the header (animation-delay).
      To change the link: update href="lab.html".
      To change the label: edit the .lab-nav-label text in HTML.
      ─────────────────────────────────────────────────────────────
    */
    .lab-nav {
      max-width: 900px;
      margin: 0 auto;
      padding: 18px 48px 0;
      display: flex;
      align-items: center;
      gap: 20px;
      opacity: 0;
      animation: fadeUp 0.5s 0.15s ease forwards;
    }

    /* Bordered "Laboratory →" pill button */
    .lab-nav-link {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      padding: 5px 12px;
      transition: background 0.18s, color 0.18s;
    }
    .lab-nav-link:hover { background: var(--accent); color: var(--white); }

    /* Faint grey descriptor beside the button */
    .lab-nav-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--light);
    }

    @media (max-width: 600px) {
      .lab-nav { padding: 14px 24px 0; }
    }


    /*
      ─────────────────────────────────────────────────────────────
      MAIN CONTENT AREA
      Wraps all the category sections injected by JS.
      Publications are injected into the adjacent div, not here.
      Increase padding-bottom to add more space above the footer.
      ─────────────────────────────────────────────────────────────
    */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 48px 120px;
    }


    /*
      ─────────────────────────────────────────────────────────────
      CATEGORY SECTION
      Each content group (Press & News, Academic Positions, etc.)
      is a .category block. They fade in with staggered delays set
      inline by JS via the animation-delay style attribute.
      scroll-margin-top prevents the sticky nav from covering the
      section heading when a nav button scrolls to it — adjust this
      value if the nav bar height ever changes.
      ─────────────────────────────────────────────────────────────
    */
    .category {
      margin-top: 60px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.55s ease forwards;
      scroll-margin-top: 52px; /* offset = sticky nav height */
    }

    /* Section header row:  [LABEL TEXT] ──────── [COUNT] */
    .category-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    /*
      Section label e.g. "PRESS & NEWS".
      To increase its size: change font-size here.
    */
    .category-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
    }

    /* Horizontal rule stretching between the label and the count */
    .category-line {
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    /* Item count at the right end of the section header e.g. "10" */
    .category-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      color: var(--light);
    }


    /*
      ─────────────────────────────────────────────────────────────
      ARTICLE ROW
      Each item (press article, position, award) is a list item
      with a full-width clickable link.
      On hover: the row slides right 12px, the title turns teal,
      and the ↗ arrow shifts diagonally up-right.
      ─────────────────────────────────────────────────────────────
    */
    .article-list { list-style: none; }

    /* Every item has a bottom border; only the first has a top border */
    .article-item { border-bottom: 1px solid var(--rule); }
    .article-item:first-child { border-top: 1px solid var(--rule); }

    /*
      Two-column grid: content left, date right.
      .has-logo adds a third 54px column on the far left for logos
      (Academic Positions only).
    */
    .article-link {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 20px;
      padding: 16px 0;
      text-decoration: none;
      color: inherit;
      transition: padding-left 0.22s ease;
    }
    .article-link:hover { padding-left: 12px; } /* slides content right on hover */
    .article-link:hover .article-title { color: var(--accent); }

    /* ↗ arrow injected via CSS — no extra HTML element required */
    .article-link::after {
      content: '↗';
      font-size: 0.72rem;
      color: var(--light);
      transition: color 0.2s, transform 0.2s;
    }
    .article-link:hover::after {
      color: var(--accent);
      transform: translate(2px, -2px); /* diagonal shift on hover */
    }


    /*
      ─────────────────────────────────────────────────────────────
      INSTITUTION LOGOS  (Academic Positions section only)
      When an article object has a logoTitle property, the grid
      gains a 54px column on the left for the institution logo.
      Logo files live in the logos/ folder. The LOGOS object in
      the JS maps logoTitle values to their filenames.
      Logos are shown in muted greyscale by default and reveal
      their colour on hover.
      To add an institution: add the SVG to logos/ and add an
      entry in the LOGOS JS object.
      ─────────────────────────────────────────────────────────────
    */
    .article-link.has-logo { grid-template-columns: 54px 1fr auto; }

    .institution-logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 46px;
      flex-shrink: 0;
    }

    .institution-logo {
      max-width: 50px;
      max-height: 42px;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: grayscale(0.8) opacity(0.55); /* muted by default */
      transition: filter 0.25s ease;
    }
    .article-link:hover .institution-logo {
      filter: grayscale(0.1) opacity(0.9); /* full colour on hover */
    }

    /* Vertical stack holding the article title and publication name */
    .article-left {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* Article / paper / position title — serif for an editorial feel */
    .article-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.4;
      color: var(--black);
      transition: color 0.2s;
    }

    /* Journal or outlet name — small monospace label below the title */
    .article-pub {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--mid);
    }

    /* Year or month-year stamp on the right side of each row */
    .article-date {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      color: var(--light);
      white-space: nowrap;
      align-self: center;
    }


    /* Small grey attribution line below the publications list */
    .source-note {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.08em;
      color: var(--light);
      margin-top: 14px;
    }
    .source-note a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
    }


    /*
      ─────────────────────────────────────────────────────────────
      "VIEW ALL PUBLICATIONS" BUTTON
      Appears below the PREVIEW_COUNT preview publications.
      Clicking it opens the full-list subwindow modal.
      To change how many publications show before this button:
      update the PREVIEW_COUNT constant in the JavaScript.
      ─────────────────────────────────────────────────────────────
    */
    .view-all-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      background: none;
      border: 1px solid var(--accent);
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }
    .view-all-btn:hover { background: var(--accent); color: var(--white); }


    /*
      ─────────────────────────────────────────────────────────────
      PUBLICATIONS SUBWINDOW — OVERLAY
      Full-screen semi-transparent layer behind the modal.
      Starts hidden (opacity:0, pointer-events:none). JS adds the
      .open class to fade it in and make it clickable.
      Clicking the overlay closes the modal.
      backdrop-filter: blur gives a frosted-glass effect to content
      visible behind the overlay.
      ─────────────────────────────────────────────────────────────
    */
    .sub-overlay {
      position: fixed;
      inset: 0;                          /* covers the entire viewport */
      background: rgba(20, 26, 31, 0.4);
      backdrop-filter: blur(3px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }
    .sub-overlay.open { opacity: 1; pointer-events: all; }


    /*
      ─────────────────────────────────────────────────────────────
      PUBLICATIONS SUBWINDOW — PANEL
      The white modal centred on screen.
      Uses a scale + fade entrance — cubic-bezier gives a slight
      spring/overshoot feel on open.
      max-height: 78vh prevents overflow on short screens.
      Flex column keeps the header and search fixed while only
      the list scrolls.
      To change the width: adjust the min() value.
      To change the max height: adjust max-height.
      ─────────────────────────────────────────────────────────────
    */
    .subwindow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -44%) scale(0.97); /* hidden: off-centre + scaled down */
      width: min(680px, 92vw);
      max-height: 78vh;
      background: var(--white);
      z-index: 101;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 80px rgba(20,26,31,0.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.34,1.26,0.64,1);
    }
    .subwindow.open {
      opacity: 1;
      pointer-events: all;
      transform: translate(-50%, -50%) scale(1); /* open: perfectly centred + full size */
    }

    /* Top bar: title + count on left, ✕ close button on right */
    .sub-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 28px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0; /* stays fixed while the list scrolls below */
    }
    .sub-header-left { display: flex; flex-direction: column; gap: 4px; }
    .sub-header-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }
    /* Updated by JS e.g. "12 of 12" or "3 of 12" during search */
    .sub-header-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      color: var(--light);
    }
    .sub-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--light);
      font-size: 1.1rem;
      padding: 4px 8px;
      transition: color 0.18s;
      font-family: 'Outfit', sans-serif;
    }
    .sub-close:hover { color: var(--black); }

    /* Search input — filters the list in real time (wired in JS section 7) */
    .sub-search-wrap {
      padding: 14px 28px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .sub-search {
      width: 100%;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--black);
      background: var(--bg);
      border: 1px solid var(--rule);
      padding: 8px 14px;
      outline: none;
      transition: border-color 0.18s;
    }
    .sub-search::placeholder { color: var(--light); }
    .sub-search:focus { border-color: var(--accent); } /* teal border on focus */

    /* The scrollable list — only this part scrolls inside the modal */
    .sub-list {
      overflow-y: auto;
      flex: 1;
      padding: 0 28px;
    }
    .sub-list .article-item { border-bottom: 1px solid var(--rule); }
    .sub-list .article-item:first-child { border-top: none; }
    .sub-list .article-link { padding: 14px 0; }
    .sub-list .article-link::after { content: '↗'; }

    /* Shown by JS when search returns zero results */
    .sub-empty {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--light);
      padding: 40px 0;
      text-align: center;
      display: none; /* JS toggles to 'block' when needed */
    }

    /* Fixed footer bar at the very bottom of the modal */
    .sub-footer {
      padding: 12px 28px;
      border-top: 1px solid var(--rule);
      flex-shrink: 0;
      font-family: 'Space Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.08em;
      color: var(--light);
    }


    /*
      ─────────────────────────────────────────────────────────────
      FOOTER
      A thin horizontal rule followed by a two-column row:
        Meng Guo (italic serif, left)  |  Updated YYYY (right)
      The year is injected by JS on page load.
      ─────────────────────────────────────────────────────────────
    */
    .footer-rule { max-width: 900px; margin: 0 auto; padding: 0 48px; }
    .footer-rule hr { border: none; border-top: 1px solid var(--rule); }

    footer {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 48px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-name {
      font-family: 'Libre Baskerville', serif;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--light);
    }
    .footer-note {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: var(--light);
      text-transform: uppercase;
    }


    /*
      ─────────────────────────────────────────────────────────────
      STICKY SECTION NAV
      A bar that sticks to the top of the viewport as you scroll.
      Contains jump buttons for each major page section.
      Clicking a button smoothly scrolls to the target section.
      The active button highlights automatically via an
      IntersectionObserver as sections enter/leave view (JS 6).

      To add a button:
        1. Add a <button> in the HTML below with the right data-target.
        2. Ensure the target section has a matching id (set via
           SECTION_IDS in JS, or inside renderPublicationsSection).
      To change button font size: edit font-size in .section-nav-btn.
      ─────────────────────────────────────────────────────────────
    */
    .section-nav {
      position: sticky;
      top: 0;           /* sticks to the top when the user scrolls past it */
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      box-shadow: 0 1px 0 var(--rule);
    }
    .section-nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 48px;
      display: flex;
      overflow-x: auto;        /* horizontal scroll on narrow screens */
      scrollbar-width: none;   /* hides scrollbar in Firefox */
      gap: 4px;
    }
    .section-nav-inner::-webkit-scrollbar { display: none; } /* hides in Chrome/Safari */

    /* Individual tab buttons — change font-size here to resize all tabs */
    .section-nav-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
      background: none;
      border: none;
      border-bottom: 2px solid transparent; /* placeholder for the active underline */
      padding: 14px 14px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.18s, border-color 0.18s;
      text-decoration: none;
      display: inline-block;
    }
    .section-nav-btn:hover { color: var(--black); }

    /* Active state — teal text + underline — toggled by IntersectionObserver in JS */
    .section-nav-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }


    /*
      ─────────────────────────────────────────────────────────────

  <!--

      1. Add a <button> here with a new data-target value.

  <!--

    Three ways to close: ✕ button · click overlay · press Escape.

    ═══════════════════════════════════════════════════════════════
  -->

    // ============================================================
    // 2. GROUPING & SORTING
    // groupByCategory() splits the flat articles array into an
    // object keyed by category name, then sorts each group with
    // the newest entries first.
    //
    // parseDateValue() converts "Feb 2025" or "2025" into a
    // sortable number (year*100 + month) for reliable comparison.
    // ============================================================

    function parseDateValue(dateStr) {
      const months = {
        Jan:1, Feb:2, Mar:3, Apr:4, May:5, Jun:6,
        Jul:7, Aug:8, Sep:9, Oct:10, Nov:11, Dec:12,
      };
      const parts = dateStr.trim().split(' ');
      if (parts.length === 2) {
        const month = months[parts[0]] || 0;
        const year  = parseInt(parts[1], 10);
        return year * 100 + month;
      }
      return parseInt(parts[0], 10) * 100;
    }

    function groupByCategory(articles) {
      const groups = {};
      for (const article of articles) {
        if (!groups[article.category]) groups[article.category] = [];
        groups[article.category].push(article);
      }
      // Sort each category group newest-first
      for (const key of Object.keys(groups)) {
        groups[key].sort((a, b) => parseDateValue(b.date) - parseDateValue(a.date));
      }
      return groups;
    }

            ${logoHTML}

              <span class="article-pub">${article.publication}</span>

    }

    /*
      Maps category names to HTML section ids.
      These ids must match the data-target values on the sticky nav
      buttons in the HTML above.
      To make a new category navigable: add it here and add the
      matching button to the section-nav HTML.
    */
    const SECTION_IDS = {
      'Press & News':         'section-press',
      'Academic Positions':   'section-positions',
      'Awards & Recognition': 'section-awards',
    };

    function renderCategory(name, items, index) {
      const count = String(items.length).padStart(2, '0');
      const id = SECTION_IDS[name] || '';
      return `
        <section class="category" ${id ? `id="${id}"` : ''} style="animation-delay:${0.1 + index * 0.1}s">
          <div class="category-header">
            <span class="category-label">${name}</span>

            <span class="category-count">${count}</span>
          </div>
          <ul class="article-list">
            ${items.map(renderArticle).join('')}
          </ul>
        </section>`;
    }

    function renderPage() {
      const groups = groupByCategory(articles);
      document.getElementById('content').innerHTML =
        Object.entries(groups)
          .map(([name, items], i) => renderCategory(name, items, i))
          .join('');

    // ============================================================

    function renderPublicationsSection(section, pubs, source) {

      const total   = pubs.length;

    // ============================================================
    // 6. STICKY SECTION NAV — SCROLL HIGHLIGHTING
    // initSectionNav() wires two behaviours:
    //   A) Click → smooth-scrolls to the section matching data-target.
    //   B) Scroll → highlights the button of the section currently
    //      passing through the upper portion of the viewport,
    //      detected via IntersectionObserver.
    //
    // Called after renderPublicationsSection() because that function
    // creates the section-publications id which didn't exist before.
    // ============================================================

    function initSectionNav() {
      const buttons = document.querySelectorAll('.section-nav-btn');

      // A) Click → smooth scroll to the matching section
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          const target = document.getElementById(btn.dataset.target);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });

      // B) IntersectionObserver → highlights the button for the
      //    section currently visible in the upper viewport area
      const sections = Array.from(buttons)
        .map(btn => document.getElementById(btn.dataset.target))
        .filter(Boolean); // removes any null entries for missing ids

      const navHeight = document.getElementById('sectionNav').offsetHeight;

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            // Remove .active from all buttons, add it only to the matching one
            buttons.forEach(btn => {
              btn.classList.toggle('active', btn.dataset.target === id);
            });
          }
        });
      }, {
        // Shrinks the observation window: a section is "active" when it
        // enters the top 40% of the viewport (below the sticky nav)
        rootMargin: `-${navHeight + 8}px 0px -60% 0px`,
        threshold: 0,
      });

      sections.forEach(s => observer.observe(s));
    }


    // ============================================================
    // 7. PUBLICATIONS SUBWINDOW
    // Manages the full-list modal dialog.
    //
    // openSubwindow()  → called when "View all N publications" clicked
    // closeSubwindow() → called by ✕ button, overlay click, or Escape
    // renderSubList()  → rebuilds the modal list; called on open and
    //                    on every search keystroke
    // ============================================================

    const subOverlay = document.getElementById('subOverlay');
    const subwindow  = document.getElementById('subwindow');
    const subClose   = document.getElementById('subClose');
    const subList    = document.getElementById('subList');
    const subSearch  = document.getElementById('subSearch');
    const subEmpty   = document.getElementById('subEmpty');
    const subCount   = document.getElementById('subCount');

    function renderSubList(pubs) {
      subList.innerHTML = pubs.map(renderArticle).join('');
      const none = pubs.length === 0;
      subEmpty.style.display = none ? 'block' : 'none'; // "no results" message
      subList.style.display  = none ? 'none'  : '';
      subCount.textContent   = `${pubs.length} of ${(window._pubs || []).length}`;
    }

    function openSubwindow() {
      renderSubList(window._pubs || []);
      subSearch.value = '';              // clear any previous search query
      subwindow.classList.add('open');
      subOverlay.classList.add('open');
      document.body.style.overflow = 'hidden'; // prevent background from scrolling
      subSearch.focus();                  // keyboard-ready immediately on open
    }

    function closeSubwindow() {
      subwindow.classList.remove('open');
      subOverlay.classList.remove('open');
      document.body.style.overflow = ''; // restore background scrolling
    }

    // Three ways to close the modal:
    subClose.addEventListener('click', closeSubwindow);       // ✕ button
    subOverlay.addEventListener('click', closeSubwindow);     // clicking the dark overlay
    document.addEventListener('keydown', e => {               // pressing Escape
      if (e.key === 'Escape') closeSubwindow();
    });

    // Live search: filter by title or journal as the user types
    subSearch.addEventListener('input', () => {
      const q = subSearch.value.toLowerCase().trim();
      const filtered = q
        ? (window._pubs || []).filter(p =>
            p.title.toLowerCase().includes(q) ||
            p.publication.toLowerCase().includes(q))
        : (window._pubs || []); // empty query → show all publications
      renderSubList(filtered);
    });

  </script>
</body>
</html>
