<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Press & News — Meng Guo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Ma+Shan+Zheng&family=Outfit:wght@200;300;400&family=Space+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root { --black:#141a1f; --mid:#7a8a96; --light:#b0bec8; --bg:#f7f5f2; --white:#ffffff; --accent:#3a7a6a; --rule:#ddd8d0; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--black); font-weight: 300; -webkit-font-smoothing: antialiased; }

    header { max-width: 900px; margin: 0 auto; padding: 64px 48px 0; opacity: 0; transform: translateY(16px); animation: fadeUp 0.7s ease forwards; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 32px; margin-bottom: 14px; }
    .site-name { font-family: 'Libre Baskerville', Georgia, serif; font-size: clamp(2.4rem, 5.5vw, 4rem); font-weight: 400; line-height: 1.1; letter-spacing: -0.02em; color: var(--black); text-decoration: none; display: block; }
    .site-name span { display: block; font-style: italic; color: var(--accent); }
    .site-name-zh { font-family: 'Ma Shan Zheng', cursive; font-size: clamp(1.6rem, 3.5vw, 2.6rem); color: var(--mid); letter-spacing: 0.06em; padding-left: 18px; align-self: flex-end; padding-bottom: 0.12em; line-height: 1; }
    .header-image-wrap { position: relative; flex: 0 0 auto; width: clamp(260px, 44%, 430px); height: 165px; overflow: visible; align-self: flex-start; margin-right: -8px; }
    .header-image { width: 100%; height: 100%; object-fit: contain; object-position: right center; display: block; }
    .header-role { font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid); line-height: 1; margin-bottom: 18px; }
    .header-rule { width: 100%; height: 1px; background: linear-gradient(to right, var(--black) 60%, transparent); margin-bottom: 4px; }
    .header-rule-thin { width: 100%; height: 1px; background: linear-gradient(to right, var(--rule) 80%, transparent); }

    .site-nav { max-width: 900px; margin: 0 auto; padding: 20px 48px 0; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; opacity: 0; animation: fadeUp 0.5s 0.15s ease forwards; }
    .site-nav-link { font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--mid); text-decoration: none; border: 1px solid var(--rule); padding: 6px 14px; transition: background 0.18s, color 0.18s, border-color 0.18s; }
    .site-nav-link:hover { border-color: var(--accent); color: var(--accent); }
    .site-nav-link.active { background: var(--accent); color: var(--white); border-color: var(--accent); }

    main { max-width: 900px; margin: 0 auto; padding: 0 48px 120px; }

    .category { margin-top: 60px; opacity: 0; transform: translateY(10px); animation: fadeUp 0.55s ease forwards; }
    .category-header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
    .category-label { font-family: 'Space Mono', monospace; font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); white-space: nowrap; }
    .category-line { flex: 1; height: 1px; background: var(--rule); }
    .category-count { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--light); }

    .article-list { list-style: none; }
    .article-item { border-bottom: 1px solid var(--rule); }
    .article-item:first-child { border-top: 1px solid var(--rule); }
    .article-link { display: grid; grid-template-columns: 150px 1fr auto; align-items: center; gap: 22px; padding: 18px 0; text-decoration: none; color: inherit; transition: padding-left 0.22s ease; }
    .article-link:hover { padding-left: 8px; }
    .article-link:hover .article-title { color: var(--accent); }
    .article-link::after { content: '↗'; font-size: 0.72rem; color: var(--light); transition: color 0.2s, transform 0.2s; }
    .article-link:hover::after { color: var(--accent); transform: translate(2px,-2px); }

    .article-left { display: flex; flex-direction: column; gap: 5px; }
    .article-title { font-family: 'Libre Baskerville', serif; font-size: 1.05rem; font-weight: 400; line-height: 1.4; color: var(--black); transition: color 0.2s; }
    .article-pub { font-family: 'Space Mono', monospace; font-size: 0.58rem; letter-spacing: 0.09em; text-transform: uppercase; color: var(--mid); }
    .article-date { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--light); white-space: nowrap; align-self: center; }

    .footer-rule { max-width: 900px; margin: 0 auto; padding: 0 48px; }
    .footer-rule hr { border: none; border-top: 1px solid var(--rule); }
    footer { max-width: 900px; margin: 0 auto; padding: 24px 48px 60px; display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; }
    .footer-name { font-family: 'Libre Baskerville', serif; font-size: 0.9rem; font-style: italic; color: var(--light); }
    .footer-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; text-align: right; }
    .footer-note { font-family: 'Space Mono', monospace; font-size: 0.52rem; letter-spacing: 0.1em; color: var(--light); text-transform: uppercase; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 640px) {
      header { padding: 48px 24px 0; }
      .header-top { flex-direction: column; }
      .header-image-wrap { display: none; }
      .site-nav { padding: 16px 24px 0; }
      main { padding: 0 24px 80px; }
      .footer-rule { padding: 0 24px; }
      footer { padding: 20px 24px 48px; flex-direction: column; gap: 10px; align-items: flex-start; }
      .footer-meta { align-items: flex-start; text-align: left; }
      .article-link { grid-template-columns: 1fr; gap: 14px; }
      .article-date { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <a href="index.html" style="text-decoration:none;">
        <div style="display:flex; align-items:baseline; flex-wrap:wrap; gap:0;">
          <h1 class="site-name">Meng <span>Guo</span></h1>
          <span class="site-name-zh">郭萌</span>
        </div>
      </a>
      <div class="header-image-wrap">
        <img class="header-image" src="assets/header0.svg" alt="" aria-hidden="true" />
      </div>
    </div>
    <p class="header-role">Assistant Professor &nbsp;·&nbsp; HKU</p>
    <p class="header-role">Department of Earth and Planetary Sciences</p>
    <div class="header-rule"></div>
    <div class="header-rule-thin"></div>
  </header>

  <nav class="site-nav">
    <a class="site-nav-link" href="index.html">Home</a>
    <a class="site-nav-link active" href="press.html">Press &amp; News</a>
    <a class="site-nav-link" href="publications.html">Publications</a>
    <a class="site-nav-link" href="lab.html">Research Group</a>
    <a class="site-nav-link" href="opportunities.html">Opportunities</a>
    <a class="site-nav-link" href="contact.html">Contact</a>
  </nav>

  <main>
    <section class="category" style="animation-delay:0.1s">
      <div class="category-header">
        <span class="category-label">Press &amp; News</span>
        <div class="category-line"></div>
        <span class="category-count" id="press-count"></span>
      </div>
      <ul class="article-list" id="press-list"></ul>
    </section>
  </main>

  <div class="footer-rule"><hr /></div>
  <footer>
    <span class="footer-name">© 2026 Meng Guo</span>
    <div class="footer-meta">
      <span class="footer-note" id="footer-year"></span>
      <span class="footer-note">Designed and maintained by G. Scanavini</span>
    </div>
  </footer>

  <script>
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('footer-year').textContent = 'Last updated: ' + months[new Date().getMonth()] + ' ' + new Date().getFullYear();

    // ── Press & News data ──
    // To add an entry: copy one object and paste it into the array.
    const pressItems = [
      { title: "Earth's acid test: When did ocean acidity allow life to commence?", publication: "Yale News", date: "Mar 2025", url: "https://news.yale.edu/2025/02/10/earths-acid-test-when-did-ocean-acidity-allow-life-commence", thumbnail: "https://news.yale.edu/sites/default/files/styles/horizontal_topper_image/public/2025-02/YNews-Ocean-Acidity-Life.jpg?h=fcf25457&itok=nAP1xpL9", fallback: "assets/press/press-01.svg" },
      { title: "Acidic oceans delayed the emergence of life on early Earth", publication: "NTU Science", date: "Mar 2025", url: "https://blogs.ntu.edu.sg/science/2025/03/17/acidic-oceans-delayed-the-emergence-of-life-on-early-earth/", thumbnail: "https://bpb-us-e1.wpmucdn.com/blogs.ntu.edu.sg/dist/a/2084/files/2025/03/DSC09867-1024x631.jpg", fallback: "assets/press/press-02.svg" },
      { title: "Earth's acid test: When did ocean acidity allow life to commence?", publication: "Technology.org", date: "Feb 2025", url: "https://www.technology.org/2025/02/15/earths-acid-test-when-did-ocean-acidity-allow-life-to-commence/", thumbnail: "https://news.yale.edu/sites/default/files/styles/horizontal_topper_image/public/2025-02/YNews-Ocean-Acidity-Life.jpg?h=fcf25457&itok=nAP1xpL9", fallback: "assets/press/press-03.svg" },
      { title: "Earth's acid test: When did ocean acidity allow life to commence?", publication: "Ocean Acidification International Coordination Centre", date: "Feb 2025", url: "https://news-oceanacidification-icc.org/2025/02/13/earths-acid-test-when-did-ocean-acidity-allow-life-commence/", thumbnail: "https://news.yale.edu/sites/default/files/styles/horizontal_topper_image/public/2025-02/YNews-Ocean-Acidity-Life.jpg?h=fcf25457&itok=nAP1xpL9", fallback: "assets/press/press-04.svg" },
      { title: "pH-inding the origins of life — interview on early Earth's oceans", publication: "Money FM 89.3 — Climate Connections Podcast", date: "2025", url: "https://www.linkedin.com/in/meng-guo-a65a10258/", thumbnail: "https://news.yale.edu/sites/default/files/styles/horizontal_topper_image/public/2025-02/YNews-Ocean-Acidity-Life.jpg?h=fcf25457&itok=nAP1xpL9", fallback: "assets/press/press-05.svg" },
      { title: "Earth needed time to 'mix' its continental crust, Yale researchers say", publication: "Yale News", date: "Mar 2023", url: "https://news.yale.edu/2023/03/24/earth-needed-time-mix-its-continental-crust-yale-researchers-say", thumbnail: "https://news.yale.edu/sites/default/files/styles/full/public/yn-volcanoes_land_rising-ocean.jpg?itok=AOu8I8Pd", fallback: "assets/press/press-06.svg" },
      { title: "Earth needed time to 'mix' its continental crust, Yale researchers say", publication: "Yale Department of Earth & Planetary Sciences", date: "Mar 2023", url: "https://earth.yale.edu/news/earth-needed-time-mix-its-continental-crust-yale-researchers-say", thumbnail: "https://news.yale.edu/sites/default/files/styles/full/public/yn-volcanoes_land_rising-ocean.jpg?itok=AOu8I8Pd", fallback: "assets/press/press-07.svg" },
      { title: "Halogens: A Gaseous Peek into the Earth's History", publication: "Yale Scientific Magazine", date: "May 2022", url: "https://www.yalescientific.org/2022/05/halogens-a-gaseous-peek-into-the-earths-history/", thumbnail: "https://www.yalescientific.org/wp-content/uploads/ocean-500x375.jpeg", fallback: "assets/press/press-08.svg" },
      { title: "Ocean Salinity: Seawater is Less Salty Today Than First 500 Million Years of Earth", publication: "Science Times", date: "Dec 2021", url: "https://www.sciencetimes.com/articles/35026/20211214/salinity-oceans-during-first-500-million-years-earth-found-higher.htm", thumbnail: "https://d.sciencetimes.com/en/full/37461/israel-palestinian-jordan-cop26-un-climate-water.jpg?f=0564b2fb4a4b91d8d7ffebff28a4ed6e&w=875", fallback: "assets/press/press-09.svg" },
      { title: "Earth's Evolution through Eons: Using the history of argon as a constraint of continental evolution", publication: "Yale Scientific Magazine", date: "Nov 2020", url: "https://www.yalescientific.org/2020/11/earths-evolution-through-eons-using-the-history-of-argon-as-a-constraint-of-continental-evolution/", thumbnail: "https://www.yalescientific.org/wp-content/uploads/Earths-Evolution-Noora-Said-500x308.jpg", fallback: "assets/press/press-10.svg" },
    ];

    const list = document.getElementById('press-list');
    list.innerHTML = pressItems.map(p => `
      <li class="article-item">
        <a class="article-link" href="${p.url}" target="_blank" rel="noopener">
          <div class="article-left">
            <span class="article-title">${p.title}</span>
            <span class="article-pub">${p.publication}</span>
          </div>
          <span class="article-date">${p.date}</span>
        </a>
      </li>`).join('');

    document.getElementById('press-count').textContent =
      String(pressItems.length).padStart(2, '0');
  </script>
</body>
</html>
