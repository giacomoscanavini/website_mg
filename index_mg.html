<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meng Guo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@200;300;400&family=Space+Mono:wght@400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black:   #141a1f;
      --mid:     #7a8a96;
      --light:   #b0bec8;
      --bg:      #f7f5f2;
      --white:   #ffffff;
      --accent:  #3a7a6a;   /* deep teal — geological, oceanic */
      --accent2: #8b5e3c;   /* warm earth tone */
      --rule:    #ddd8d0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--black);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 48px 56px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s ease forwards;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 32px;
      margin-bottom: 28px;
    }

    .site-name {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: clamp(2.4rem, 5.5vw, 4rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--black);
    }

    .site-name span {
      display: block;
      font-style: italic;
      color: var(--accent);
    }

    .header-role {
      text-align: right;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
      line-height: 2;
      padding-top: 8px;
    }

    .header-rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, var(--black) 60%, transparent);
      margin-bottom: 4px;
    }
    .header-rule-thin {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, var(--rule) 80%, transparent);
    }

    /* ── LAB NAV ── */
    .lab-nav {
      max-width: 900px;
      margin: 0 auto;
      padding: 18px 48px 0;
      display: flex;
      align-items: center;
      gap: 20px;
      opacity: 0;
      animation: fadeUp 0.5s 0.15s ease forwards;
    }

    .lab-nav-link {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      padding: 5px 12px;
      transition: background 0.18s, color 0.18s;
    }

    .lab-nav-link:hover {
      background: var(--accent);
      color: var(--white);
    }

    .lab-nav-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--light);
    }

    @media (max-width: 600px) {
      .lab-nav { padding: 14px 24px 0; }
    }

    /* ── MAIN ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 48px 120px;
    }

    /* ── CATEGORY ── */
    .category {
      margin-top: 60px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.55s ease forwards;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .category-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
    }

    .category-line {
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    .category-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      color: var(--light);
    }

    /* ── ARTICLE ROW ── */
    .article-list { list-style: none; }

    .article-item {
      border-bottom: 1px solid var(--rule);
    }
    .article-item:first-child {
      border-top: 1px solid var(--rule);
    }

    .article-link {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 20px;
      padding: 16px 0;
      text-decoration: none;
      color: inherit;
      transition: padding-left 0.22s ease;
    }

    .article-link:hover {
      padding-left: 12px;
    }

    .article-link:hover .article-title {
      color: var(--accent);
    }

    .article-link::after {
      content: '↗';
      font-size: 0.72rem;
      color: var(--light);
      transition: color 0.2s, transform 0.2s;
    }

    .article-link:hover::after {
      color: var(--accent);
      transform: translate(2px, -2px);
    }

    /* ── INSTITUTION LOGO (Academic Positions only) ── */
    .article-link.has-logo {
      grid-template-columns: 54px 1fr auto;
    }

    .institution-logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 46px;
      flex-shrink: 0;
    }

    .institution-logo {
      max-width: 50px;
      max-height: 42px;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: grayscale(0.8) opacity(0.55);
      transition: filter 0.25s ease;
    }

    .article-link:hover .institution-logo {
      filter: grayscale(0.1) opacity(0.9);
    }

    .article-left {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .article-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.4;
      color: var(--black);
      transition: color 0.2s;
    }

    .article-pub {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .article-date {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      color: var(--light);
      white-space: nowrap;
      align-self: center;
    }

    /* ── SOURCE NOTE ── */
    .source-note {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.08em;
      color: var(--light);
      margin-top: 14px;
    }

    /* ── VIEW ALL BUTTON ── */
    .view-all-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      background: none;
      border: 1px solid var(--accent);
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }
    .view-all-btn:hover { background: var(--accent); color: var(--white); }

    /* ── SUBWINDOW OVERLAY ── */
    .sub-overlay {
      position: fixed;
      inset: 0;
      background: rgba(20, 26, 31, 0.4);
      backdrop-filter: blur(3px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }
    .sub-overlay.open { opacity: 1; pointer-events: all; }

    /* ── SUBWINDOW PANEL ── */
    .subwindow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -44%) scale(0.97);
      width: min(680px, 92vw);
      max-height: 78vh;
      background: var(--white);
      z-index: 101;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 80px rgba(20,26,31,0.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.34,1.26,0.64,1);
    }
    .subwindow.open {
      opacity: 1;
      pointer-events: all;
      transform: translate(-50%, -50%) scale(1);
    }

    .sub-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 28px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .sub-header-left { display: flex; flex-direction: column; gap: 4px; }
    .sub-header-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .sub-header-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      color: var(--light);
    }
    .sub-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--light);
      font-size: 1.1rem;
      padding: 4px 8px;
      transition: color 0.18s;
      font-family: 'Outfit', sans-serif;
    }
    .sub-close:hover { color: var(--black); }

    /* search bar */
    .sub-search-wrap {
      padding: 14px 28px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .sub-search {
      width: 100%;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--black);
      background: var(--bg);
      border: 1px solid var(--rule);
      padding: 8px 14px;
      outline: none;
      transition: border-color 0.18s;
    }
    .sub-search::placeholder { color: var(--light); }
    .sub-search:focus { border-color: var(--accent); }

    /* scrollable list */
    .sub-list {
      overflow-y: auto;
      flex: 1;
      padding: 0 28px;
    }
    .sub-list .article-item { border-bottom: 1px solid var(--rule); }
    .sub-list .article-item:first-child { border-top: none; }
    .sub-list .article-link { padding: 14px 0; }
    .sub-list .article-link::after { content: '↗'; }

    .sub-empty {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--light);
      padding: 40px 0;
      text-align: center;
      display: none;
    }

    .sub-footer {
      padding: 12px 28px;
      border-top: 1px solid var(--rule);
      flex-shrink: 0;
      font-family: 'Space Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.08em;
      color: var(--light);
    }

    .source-note a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── FOOTER ── */
    .footer-rule {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 48px;
    }

    .footer-rule hr {
      border: none;
      border-top: 1px solid var(--rule);
    }

    footer {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 48px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-name {
      font-family: 'Libre Baskerville', serif;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--light);
    }

    .footer-note {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: var(--light);
      text-transform: uppercase;
    }

    /* ── SECTION NAV ── */
    .section-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      box-shadow: 0 1px 0 var(--rule);
    }
    .section-nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 48px;
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      gap: 4px;
    }
    .section-nav-inner::-webkit-scrollbar { display: none; }

    .section-nav-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.54rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mid);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 14px 14px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.18s, border-color 0.18s;
      text-decoration: none;
      display: inline-block;
    }
    .section-nav-btn:hover { color: var(--black); }
    .section-nav-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* offset sections so sticky nav doesn't cover the heading */
    .category { scroll-margin-top: 52px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header { padding: 48px 24px 40px; }
      .header-top { flex-direction: column; }
      .header-role { text-align: left; }
      main { padding: 0 24px 80px; }
      .footer-rule { padding: 0 24px; }
      footer { padding: 20px 24px 48px; flex-direction: column; gap: 8px; align-items: flex-start; }
      .article-link { grid-template-columns: 1fr; }
      .article-link.has-logo { grid-template-columns: 42px 1fr; }
      .institution-logo-wrap { width: 42px; height: 42px; }
      .institution-logo { max-width: 38px; max-height: 36px; }
      .article-date { display: none; }
      .section-nav-inner { padding: 0 24px; }
    }
  </style>
</head>

  <script>

    const articles = [

    // ============================================================
    // 2. LOGIC — group and sort by date, newest first
    // ============================================================

    function parseDateValue(dateStr) {
      const months = {
        Jan:1, Feb:2, Mar:3, Apr:4, May:5, Jun:6,
        Jul:7, Aug:8, Sep:9, Oct:10, Nov:11, Dec:12,
      };
      const parts = dateStr.trim().split(' ');
      if (parts.length === 2) {
        const month = months[parts[0]] || 0;
        const year  = parseInt(parts[1], 10);
        return year * 100 + month;
      }
      return parseInt(parts[0], 10) * 100;
    }

    function groupByCategory(articles) {
      const groups = {};
      for (const article of articles) {
        if (!groups[article.category]) groups[article.category] = [];
        groups[article.category].push(article);
      }
      for (const key of Object.keys(groups)) {
        groups[key].sort((a, b) => parseDateValue(b.date) - parseDateValue(a.date));
      }
      return groups;
    }


    // ============================================================
    // 3. RENDER
    // ============================================================

    // ── Embedded institution logos (shield-shaped SVGs, official brand colors) ──
    const LOGOS = {
      "University_of_Hong_Kong":   "logos/hku.svg",
      "University_of_Chicago":     "logos/uchicago.svg",
      "Nanyang_Technological_University": "logos/ntu.svg",
      "Yale_University":           "logos/yale.svg",
    };

    function renderArticle(article) {
      const src = article.logoTitle ? LOGOS[article.logoTitle] : null;
      const logoHTML = src
        ? `<div class="institution-logo-wrap">
             <img class="institution-logo" src="${src}" alt="${article.publication}" />
           </div>`
        : '';
      return `
        <li class="article-item">
          <a class="article-link${src ? ' has-logo' : ''}" href="${article.url}" target="_blank" rel="noopener">
            ${logoHTML}
            <div class="article-left">
              <span class="article-title">${article.title}</span>
              <span class="article-pub">${article.publication}</span>
            </div>
            <span class="article-date">${article.date}</span>
          </a>
        </li>`;
    }

    const SECTION_IDS = {
      'Press & News':        'section-press',
      'Academic Positions':  'section-positions',
      'Awards & Recognition':'section-awards',
    };

    function renderCategory(name, items, index) {
      const count = String(items.length).padStart(2, '0');
      const id = SECTION_IDS[name] || '';
      return `
        <section class="category" ${id ? `id="${id}"` : ''} style="animation-delay:${0.1 + index * 0.1}s">
          <div class="category-header">
            <span class="category-label">${name}</span>
            <div class="category-line"></div>
            <span class="category-count">${count}</span>
          </div>
          <ul class="article-list">
            ${items.map(renderArticle).join('')}
          </ul>
        </section>`;
    }

    function renderPage() {
      const groups = groupByCategory(articles);
      document.getElementById('content').innerHTML =
        Object.entries(groups)
          .map(([name, items], i) => renderCategory(name, items, i))
          .join('');
    }


    // ============================================================
    // 4. INIT
    // ============================================================

    renderPage();
    document.getElementById('footer-year').textContent =
      'Updated ' + new Date().getFullYear();
    fetchPublications();


    // ============================================================

    async function fetchPublications() {
      const section = document.getElementById('publications-section');

      // Try publications.json first (for future updates via the fetch script)
      try {
        const res = await fetch('./publications.json');
        if (res.ok) {
          const data = await res.json();
          const pubs = data.publications || [];
          if (pubs.length > 0) {
            renderPublicationsSection(section, pubs, 'Google Scholar');
            return;
          }
        }
      } catch (_) {}

      // Fall back to embedded data
      renderPublicationsSection(section, publicationsData, 'Google Scholar');
    }

    const PREVIEW_COUNT = 5;

    function renderPublicationsSection(section, pubs, source) {
      window._pubs = pubs;
      const total = pubs.length;
      const preview = pubs.slice(0, PREVIEW_COUNT);
      const count = String(total).padStart(2, '0');

      section.outerHTML = `
        <section class="category" id="section-publications" style="animation-delay:0.2s">
          <div class="category-header">
            <span class="category-label">Research &amp; Publications</span>
            <div class="category-line"></div>
            <span class="category-count">${count}</span>
          </div>
          <ul class="article-list">
            ${preview.map(renderArticle).join('')}
          </ul>
          <button class="view-all-btn" id="viewAllBtn">
            View all ${total} publications →
          </button>
          <p class="source-note">Source: ${source}</p>
        </section>`;

      document.getElementById('viewAllBtn').addEventListener('click', openSubwindow);
      initSectionNav();
    }


    // ============================================================
    // 6. SECTION NAV
    // ============================================================

    function initSectionNav() {
      const buttons = document.querySelectorAll('.section-nav-btn');

      // Click → smooth scroll
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          const target = document.getElementById(btn.dataset.target);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });

      // Scroll → highlight active button
      const sections = Array.from(buttons)
        .map(btn => document.getElementById(btn.dataset.target))
        .filter(Boolean);

      const navHeight = document.getElementById('sectionNav').offsetHeight;

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            buttons.forEach(btn => {
              btn.classList.toggle('active', btn.dataset.target === id);
            });
          }
        });
      }, {
        rootMargin: `-${navHeight + 8}px 0px -60% 0px`,
        threshold: 0,
      });

      sections.forEach(s => observer.observe(s));
    }


    // ============================================================
    // 7. SUBWINDOW
    // ============================================================

    const subOverlay = document.getElementById('subOverlay');
    const subwindow  = document.getElementById('subwindow');
    const subClose   = document.getElementById('subClose');
    const subList    = document.getElementById('subList');
    const subSearch  = document.getElementById('subSearch');
    const subEmpty   = document.getElementById('subEmpty');
    const subCount   = document.getElementById('subCount');

    function renderSubList(pubs) {
      subList.innerHTML = pubs.map(renderArticle).join('');
      const none = pubs.length === 0;
      subEmpty.style.display = none ? 'block' : 'none';
      subList.style.display  = none ? 'none'  : '';
      subCount.textContent   = `${pubs.length} of ${(window._pubs || []).length}`;
    }

    function openSubwindow() {
      renderSubList(window._pubs || []);
      subSearch.value = '';
      subwindow.classList.add('open');
      subOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      subSearch.focus();
    }

    function closeSubwindow() {
      subwindow.classList.remove('open');
      subOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    subClose.addEventListener('click', closeSubwindow);
    subOverlay.addEventListener('click', closeSubwindow);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeSubwindow();
    });

    subSearch.addEventListener('input', () => {
      const q = subSearch.value.toLowerCase().trim();
      const filtered = q
        ? (window._pubs || []).filter(p =>
            p.title.toLowerCase().includes(q) ||
            p.publication.toLowerCase().includes(q))
        : (window._pubs || []);
      renderSubList(filtered);
    });

  </script>
