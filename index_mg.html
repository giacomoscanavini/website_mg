<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meng Guo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@200;300;400&family=Space+Mono:wght@400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black:   #141a1f;
      --mid:     #7a8a96;
      --light:   #b0bec8;
      --bg:      #f7f5f2;
      --white:   #ffffff;
      --accent:  #3a7a6a;   /* deep teal — geological, oceanic */
      --accent2: #8b5e3c;   /* warm earth tone */
      --rule:    #ddd8d0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--black);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 48px 56px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s ease forwards;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 32px;
      margin-bottom: 28px;
    }

    .site-name {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: clamp(2.4rem, 5.5vw, 4rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--black);
    }

    .site-name span {
      display: block;
      font-style: italic;
      color: var(--accent);
    }

    .header-role {
      text-align: right;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
      line-height: 2;
      padding-top: 8px;
    }

    .header-rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, var(--black) 60%, transparent);
      margin-bottom: 4px;
    }
    .header-rule-thin {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, var(--rule) 80%, transparent);
    }

    /* ── LAB NAV ── */
    .lab-nav {
      max-width: 900px;
      margin: 0 auto;
      padding: 18px 48px 0;
      display: flex;
      align-items: center;
      gap: 20px;
      opacity: 0;
      animation: fadeUp 0.5s 0.15s ease forwards;
    }

    .lab-nav-link {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      padding: 5px 12px;
      transition: background 0.18s, color 0.18s;
    }

    .lab-nav-link:hover {
      background: var(--accent);
      color: var(--white);
    }

    .lab-nav-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--light);
    }

    @media (max-width: 600px) {
      .lab-nav { padding: 14px 24px 0; }
    }

    /* ── MAIN ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 48px 120px;
    }

    /* ── CATEGORY ── */
    .category {
      margin-top: 60px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.55s ease forwards;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .category-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
    }

    .category-line {
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    .category-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      color: var(--light);
    }

    /* ── ARTICLE ROW ── */
    .article-list { list-style: none; }

    .article-item {
      border-bottom: 1px solid var(--rule);
    }
    .article-item:first-child {
      border-top: 1px solid var(--rule);
    }

    .article-link {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 20px;
      padding: 16px 0;
      text-decoration: none;
      color: inherit;
      transition: padding-left 0.22s ease;
    }

    .article-link:hover {
      padding-left: 12px;
    }

    .article-link:hover .article-title {
      color: var(--accent);
    }

    .article-link::after {
      content: '↗';
      font-size: 0.72rem;
      color: var(--light);
      transition: color 0.2s, transform 0.2s;
    }

    .article-link:hover::after {
      color: var(--accent);
      transform: translate(2px, -2px);
    }

    /* ── INSTITUTION LOGO (Academic Positions only) ── */
    .article-link.has-logo {
      grid-template-columns: 54px 1fr auto;
    }

    .institution-logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 46px;
      flex-shrink: 0;
    }

    .institution-logo {
      max-width: 50px;
      max-height: 42px;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: grayscale(0.8) opacity(0.55);
      transition: filter 0.25s ease;
    }

    .article-link:hover .institution-logo {
      filter: grayscale(0.1) opacity(0.9);
    }

    .article-left {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .article-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.4;
      color: var(--black);
      transition: color 0.2s;
    }

    .article-pub {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .article-date {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      color: var(--light);
      white-space: nowrap;
      align-self: center;
    }

    /* ── SOURCE NOTE ── */
    .source-note {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.08em;
      color: var(--light);
      margin-top: 14px;
    }

    /* ── PUB ROW (clickable, not a link) ── */
    .pub-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 20px;
      padding: 16px 0;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      color: inherit;
      transition: padding-left 0.22s ease;
    }
    .pub-row:hover { padding-left: 12px; }
    .pub-row:hover .article-title { color: var(--accent); }
    .pub-row::after {
      content: '→';
      font-size: 0.8rem;
      color: var(--light);
      transition: color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .pub-row:hover::after { color: var(--accent); transform: translateX(3px); }

    /* ── DRAWER OVERLAY ── */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(20, 26, 31, 0.35);
      backdrop-filter: blur(2px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.32s ease;
    }
    .drawer-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── DRAWER PANEL ── */
    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      height: 100%;
      width: min(480px, 92vw);
      background: var(--white);
      z-index: 101;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -8px 0 48px rgba(20,26,31,0.12);
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .drawer-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .drawer-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--light);
      font-size: 1.2rem;
      line-height: 1;
      padding: 4px 8px;
      transition: color 0.18s;
      font-family: 'Outfit', sans-serif;
    }
    .drawer-close:hover { color: var(--black); }

    .drawer-body {
      padding: 32px 32px 40px;
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .drawer-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.5;
      color: var(--black);
    }

    .drawer-meta {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .drawer-journal {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .drawer-row {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .drawer-date {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--mid);
    }
    .drawer-citations {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      background: var(--bg);
      color: var(--mid);
      border: 1px solid var(--rule);
      padding: 3px 10px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .drawer-citations-num {
      font-weight: 700;
      color: var(--accent);
      font-size: 0.7rem;
    }

    .drawer-divider {
      height: 1px;
      background: var(--rule);
    }

    .drawer-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white);
      background: var(--accent);
      text-decoration: none;
      padding: 11px 20px;
      transition: background 0.18s;
      align-self: flex-start;
    }
    .drawer-link:hover { background: var(--black); }
    .drawer-link::after { content: '↗'; font-size: 0.8rem; }

    .drawer-scholar {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      color: var(--light);
      letter-spacing: 0.08em;
      margin-top: auto;
      padding-top: 16px;
    }

    .source-note a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── FOOTER ── */
    .footer-rule {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 48px;
    }

    .footer-rule hr {
      border: none;
      border-top: 1px solid var(--rule);
    }

    footer {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 48px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-name {
      font-family: 'Libre Baskerville', serif;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--light);
    }

    .footer-note {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: var(--light);
      text-transform: uppercase;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header { padding: 48px 24px 40px; }
      .header-top { flex-direction: column; }
      .header-role { text-align: left; }
      main { padding: 0 24px 80px; }
      .footer-rule { padding: 0 24px; }
      footer { padding: 20px 24px 48px; flex-direction: column; gap: 8px; align-items: flex-start; }
      .article-link { grid-template-columns: 1fr; }
      .article-link.has-logo { grid-template-columns: 42px 1fr; }
      .institution-logo-wrap { width: 42px; height: 42px; }
      .institution-logo { max-width: 38px; max-height: 36px; }
      .article-date { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <h1 class="site-name">Meng <span>Guo</span></h1>
      <div class="header-role">
        Assistant Professor<br />

  <!-- Static categories rendered by JS -->

  <!-- Publications loaded from publications.json or INSPIRE-HEP -->
  <div style="max-width:900px; margin:0 auto; padding:0 48px;">

        <span class="category-label">Research &amp; Publications</span>
        <div class="category-line"></div>
        <span class="category-count" style="font-style:italic; color:var(--light)">loading…</span>
      </div>
    </section>
  </div>

  <div class="footer-rule"><hr /></div>
  <footer>
    <span class="footer-name">Meng Guo</span>
    <span class="footer-note" id="footer-year"></span>
  </footer>


  <!-- ── PUBLICATION DRAWER ── -->
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <script>

    // ============================================================
    // 1. DATA
    // Static articles: press, profiles, awards.
    // Publications are loaded live — see section 5 below.
    // ============================================================

    const articles = [

      {

      },

      // ── Academic Positions ──
      {
        title: "Tenure-Track Assistant Professor — Department of Earth Sciences",
        publication: "The University of Hong Kong (HKU)",
        date: "2025",

      // ── Awards & Recognition ──
      {

        publication: "University of Chicago, Department of Geophysical Sciences",

        url: "https://geosci.uchicago.edu/academics/information-for-postdocs/chamberlin-fellowship/",
        category: "Awards & Recognition",
      },
      {
        title: "NTU Presidential Postdoctoral Fellowship",
        publication: "Nanyang Technological University, Singapore",
        date: "2023",
        url: "https://www.ntu.edu.sg/research/research-careers/presidential-postdoctoral-fellowship-(ppf)",
        category: "Awards & Recognition",
      },

    ];


    // ============================================================
    // 2. LOGIC — group and sort by date, newest first
    // ============================================================

    function parseDateValue(dateStr) {
      const months = {
        Jan:1, Feb:2, Mar:3, Apr:4, May:5, Jun:6,
        Jul:7, Aug:8, Sep:9, Oct:10, Nov:11, Dec:12,
      };
      const parts = dateStr.trim().split(' ');
      if (parts.length === 2) {
        const month = months[parts[0]] || 0;
        const year  = parseInt(parts[1], 10);
        return year * 100 + month;
      }
      return parseInt(parts[0], 10) * 100;
    }

    function groupByCategory(articles) {
      const groups = {};
      for (const article of articles) {
        if (!groups[article.category]) groups[article.category] = [];
        groups[article.category].push(article);
      }
      for (const key of Object.keys(groups)) {
        groups[key].sort((a, b) => parseDateValue(b.date) - parseDateValue(a.date));
      }
      return groups;
    }


    // ============================================================
    // 3. RENDER
    // ============================================================

    // ── Embedded institution logos (shield-shaped SVGs, official brand colors) ──
    const LOGOS = {
      "University_of_Hong_Kong":   "logos/hku.svg",
      "University_of_Chicago":     "logos/uchicago.svg",
      "Nanyang_Technological_University": "logos/ntu.svg",
      "Yale_University":           "logos/yale.svg",
    };

    function renderArticle(article) {
      const src = article.logoTitle ? LOGOS[article.logoTitle] : null;
      const logoHTML = src
        ? `<div class="institution-logo-wrap">
             <img class="institution-logo" src="${src}" alt="${article.publication}" />
           </div>`
        : '';
      return `
        <li class="article-item">
          <a class="article-link${src ? ' has-logo' : ''}" href="${article.url}" target="_blank" rel="noopener">
            ${logoHTML}
            <div class="article-left">
              <span class="article-title">${article.title}</span>
              <span class="article-pub">${article.publication}</span>
            </div>
            <span class="article-date">${article.date}</span>
          </a>
        </li>`;
    }

    function renderCategory(name, items, index) {
      const count = String(items.length).padStart(2, '0');
      return `
        <section class="category" style="animation-delay:${0.1 + index * 0.1}s">
          <div class="category-header">
            <span class="category-label">${name}</span>
            <div class="category-line"></div>
            <span class="category-count">${count}</span>
          </div>
          <ul class="article-list">
            ${items.map(renderArticle).join('')}
          </ul>
        </section>`;
    }

    function renderPage() {
      const groups = groupByCategory(articles);
      document.getElementById('content').innerHTML =
        Object.entries(groups)
          .map(([name, items], i) => renderCategory(name, items, i))
          .join('');
    }

    async function fetchPublications() {
      const section = document.getElementById('publications-section');

      // Try publications.json first (for future updates via the fetch script)
      try {
        const res = await fetch('./publications.json');
        if (res.ok) {
          const data = await res.json();
          const pubs = data.publications || [];
          if (pubs.length > 0) {
            renderPublicationsSection(section, pubs, 'Google Scholar');
            return;
          }
        }
      } catch (_) {}

      // Fall back to embedded data
      renderPublicationsSection(section, publicationsData, 'Google Scholar');
    }

    function renderPublicationsSection(section, pubs, source) {
      const count = String(pubs.length).padStart(2, '0');

      // Store pubs globally so the drawer can access them
      window._pubs = pubs;

      const rows = pubs.map((pub, i) => `
        <li class="article-item">
          <button class="pub-row" onclick="openDrawer(${i})">
            <div class="article-left">
              <span class="article-title">${pub.title}</span>
              <span class="article-pub">${pub.publication}</span>
            </div>
            <span class="article-date">${pub.date}</span>
          </button>
        </li>`).join('');

      section.outerHTML = `
        <section class="category" style="animation-delay:0.2s">
          <div class="category-header">
            <span class="category-label">Research &amp; Publications</span>
            <div class="category-line"></div>
            <span class="category-count">${count}</span>
          </div>
          <ul class="article-list">${rows}</ul>
          <p class="source-note">Source: ${source}</p>
        </section>`;
    }


    // ============================================================
    // 6. DRAWER
    // ============================================================

    const drawer     = document.getElementById('pubDrawer');
    const overlay    = document.getElementById('drawerOverlay');
    const drawerBody = document.getElementById('drawerBody');
    const drawerClose = document.getElementById('drawerClose');

    function openDrawer(index) {
      const pub = window._pubs[index];
      if (!pub) return;

      const citationHTML = pub.citations > 0
        ? `<span class="drawer-citations">
             <span class="drawer-citations-num">${pub.citations}</span> citations
           </span>`
        : '';

      const isDOI = pub.url && pub.url.includes('doi.org');
      const linkLabel = isDOI ? 'View Paper' : 'View on Scholar';

      drawerBody.innerHTML = `
        <p class="drawer-title">${pub.title}</p>
        <div class="drawer-meta">
          <span class="drawer-journal">${pub.publication}</span>
          <div class="drawer-row">
            <span class="drawer-date">${pub.date}</span>
            ${citationHTML}
          </div>
        </div>
        <div class="drawer-divider"></div>
        <a class="drawer-link" href="${pub.url}" target="_blank" rel="noopener">${linkLabel}</a>
        <p class="drawer-scholar">Citation data sourced from Google Scholar</p>
      `;

      drawer.classList.add('open');
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      drawerClose.focus();
    }

    function closeDrawer() {
      drawer.classList.remove('open');
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    drawerClose.addEventListener('click', closeDrawer);
    overlay.addEventListener('click', closeDrawer);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeDrawer();
    });

  </script>
